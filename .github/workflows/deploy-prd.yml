name: Despliegue a Producción

on:
  push:
    branches:
      - main  # Se activa cuando haces merge de QA a MAIN

jobs:
  deploy:
    name: Desplegar y Monitorear PROD
    runs-on: prod-server  # Usamos la etiqueta que configuraste en el servidor de producción

    steps:
      - name: Actualizar y Reiniciar
        id: deploy_step
        run: |
          cd "/home/soporte/api" # Asegúrate de que esta sea la ruta en el servidor PROD
          
          # 1. Guardar referencia del commit actual
          PREVIOUS_COMMIT=$(git rev-parse HEAD)
          echo "PREVIOUS_COMMIT=$PREVIOUS_COMMIT" >> $GITHUB_ENV
          
          # 2. Intentar actualización
          git fetch origin main
          git reset --hard origin/main
          
          # 3. Actualizar entorno virtual
          source venv/bin/activate
          pip install -r requirements.txt
          
          # 4. Gestión inteligente de PM2
          if pm2 describe api-profit > /dev/null 2>&1; then
            echo "Reiniciando proceso existente..."
            pm2 restart api-profit --update-env
          else
            echo "El proceso no existe. Iniciándolo por primera vez..."
            pm2 start server.py --name api-profit
          fi

      - name: Rollback Automático en caso de fallo
        if: failure()
        run: |
          cd "/home/soporte/api"
          echo "Error detectado. Iniciando Rollback al commit $PREVIOUS_COMMIT..."
          git reset --hard $PREVIOUS_COMMIT
          source venv/bin/activate
          pip install -r requirements.txt
          pm2 restart api-profit

      - name: Notificar Error por Correo
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Fallo de Despliegue en PRODUCCIÓN - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions PROD
          body: |
            El despliegue en la rama MAIN (PRODUCCIÓN) ha fallado.
            
            Evento: ${{ github.event_name }}
            Commit: ${{ github.sha }}
            
            Se ha ejecutado un rollback automático al último estado estable en el servidor de producción.